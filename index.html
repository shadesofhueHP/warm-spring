<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warm Spring</title>

<style>
*{box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
margin:0;
background:#f5f2f1;
}

.container{
max-width:900px;
margin:auto;
padding:8px 16px 16px;
}

.header{
text-align:center;
margin-bottom:8px;
}

.logo{
display:block;
max-width:220px;
margin:0 auto 6px;
}

.header h1{
font-family:Georgia,serif;
font-weight:500;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.section-title{
grid-column:1/-1;
font-size:12px;
letter-spacing:.15em;
color:#6d7280;
margin-top:14px;
}

.tile{
aspect-ratio:1;
border-radius:20px;
cursor:pointer;
}

.lightbox{
position:fixed;
inset:0;
display:none;
z-index:999;
}

.lightbox.show{
display:block;
}

.lightbox-color{
position:absolute;
inset:0;
}

.close-btn{
position:absolute;
top:32px;
right:32px;
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.22);
color:white;
font-size:22px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
cursor:pointer;
}

.controls{
position:absolute;
top:32px;
right:84px;
display:flex;
gap:8px;
}

.btn{
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.22);
color:white;
font-size:16px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
cursor:pointer;
}

.swipe{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
color:white;
letter-spacing:.15em;
font-size:12px;
}

@media (max-width:640px){
.logo{max-width:180px;}
.grid{gap:12px;}
.tile{border-radius:18px;}

.close-btn{
top:28px;
right:28px;
}

.controls{
top:28px;
right:76px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img class="logo" src="logo.png" alt="Shades of Hue logo">
<h1>Warm Spring</h1>
<div>Tap color • Swipe to browse</div>
</div>

<div id="grid" class="grid"></div>

</div>

<div id="lightbox" class="lightbox">
<div id="lightboxColor" class="lightbox-color"></div>

<button id="close" class="close-btn">×</button>

<div class="controls">
<button id="prev" class="btn">←</button>
<button id="next" class="btn">→</button>
</div>

<div class="swipe">SWIPE</div>
</div>

<script>

const groups = [

{
title:"WARM SPRING NEUTRALS",
colors:[
"#FFF7E6",
"#F3E3C7",
"#E9D2A5",
"#DDB97F",
"#C79A5E",
"#A8733C"
]
},

{
title:"CAMEL + COGNAC",
colors:[
"#E7C7A1",
"#D8AF7A",
"#C9965D",
"#B6824A",
"#9E6D3C"
]
},

{
title:"BUTTER + HONEY",
colors:[
"#FAE79B",
"#F6DD6A",
"#F2CE3E",
"#F0B93C",
"#E8A52C"
]
},

{
title:"MARIGOLD + ORANGE",
colors:[
"#FDBA4A",
"#F9A23B",
"#F68C2B",
"#F3761D",
"#EA6617"
]
},

{
title:"CORALS + SALMON",
colors:[
"#F7B4A4",
"#F59C8B",
"#F7866F",
"#F27263",
"#EC6658"
]
},

{
title:"WARM REDS",
colors:[
"#FF4E3A",
"#F8422F",
"#F1342A",
"#E64B36",
"#DC4A35"
]
},

{
title:"WARM PINKS",
colors:[
"#E88CA0",
"#E56F8F",
"#E05D82",
"#DB4F76"
]
},

{
title:"YELLOW GREENS",
colors:[
"#C9DB4B",
"#B8D23F",
"#A6C83A",
"#91BD32",
"#7FAE2E"
]
},

{
title:"SPRING GREENS",
colors:[
"#9EDC4A",
"#5ED63D",
"#3FC63A",
"#24B23A",
"#1EA33C"
]
},

{
title:"TURQUOISE + TEAL",
colors:[
"#6FD0CB",
"#4CC4C4",
"#27B9BB",
"#1FAEB0",
"#1B9EA1"
]
},

{
title:"AQUA BLUES",
colors:[
"#8DD0E6",
"#6EBFE0",
"#4EAED8",
"#339FD0",
"#2C8AC6"
]
},

{
title:"WARM SKY BLUE",
colors:[
"#6FA7D8",
"#4F8FCE"
]
}

];

const grid=document.getElementById("grid");
const lightbox=document.getElementById("lightbox");
const lightboxColor=document.getElementById("lightboxColor");

let all=[];
let index=0;
let startX=0;

groups.forEach(group=>{

const title=document.createElement("div");
title.className="section-title";
title.textContent=group.title;
grid.appendChild(title);

group.colors.forEach(color=>{

all.push(color);

const tile=document.createElement("div");
tile.className="tile";
tile.style.background=color;

tile.onclick=()=>{
index=all.indexOf(color);
open();
};

grid.appendChild(tile);

});

});

function open(){
lightbox.classList.add("show");
render();
}

function render(){
lightboxColor.style.background=all[index];
}

function next(){
index=(index+1)%all.length;
render();
}

function prev(){
index=(index-1+all.length)%all.length;
render();
}

document.getElementById("close").onclick=()=>lightbox.classList.remove("show");
document.getElementById("next").onclick=next;
document.getElementById("prev").onclick=prev;

lightbox.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

lightbox.addEventListener("touchend",e=>{
let diff=e.changedTouches[0].clientX-startX;
if(Math.abs(diff)<40)return;
diff<0?next():prev();
});

</script>

</body>
</html>
